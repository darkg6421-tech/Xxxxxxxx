<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Click Me – Nothing Happens :)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .message {
            text-align: center;
            font-size: 2rem;
            opacity: 0.8;
        }
        .small {
            font-size: 1rem;
            opacity: 0.5;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="message">
        🔊 Click anywhere <br>
        <span class="small">(Volume up for best experience)</span>
    </div>

    <script>
        (function() {
            // Create a piercing sound using Web Audio API – no external file needed
            function playLoudSound() {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Resume if suspended (browser policy)
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // Create oscillator for a harsh tone
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                // Frequencies: around 800 Hz and 1200 Hz – very attention-grabbing
                osc1.type = 'sawtooth';
                osc1.frequency.value = 850;
                
                osc2.type = 'square';
                osc2.frequency.value = 1250;

                // Combine them
                osc1.connect(gainNode);
                osc2.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // Set volume to MAX (but with a short fade to avoid clipping too hard)
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); // 1.0 = 100% volume
                // Slight fade out after 0.8 seconds to not destroy ears permanently
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);

                // Start and stop
                osc1.start();
                osc2.start();
                osc1.stop(audioCtx.currentTime + 0.9);
                osc2.stop(audioCtx.currentTime + 0.9);

                // Also add a quick "explosion" of white noise for extra shock
                const bufferSize = 4096;
                const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
                noiseNode.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                };
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.7, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                noiseNode.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                
                // Disconnect noise after short time
                setTimeout(() => {
                    noiseNode.disconnect();
                }, 250);
            }

            // Trigger sound on any click/tap
            document.body.addEventListener('click', function() {
                playLoudSound();
                // Change message after click
                document.querySelector('.message').innerHTML = '😂 GOT YOU!<br><span class="small">(Press F5 to reset)</span>';
            }, { once: false }); // can click multiple times for extra chaos

            // Also trigger on touch for mobile pranks
            document.body.addEventListener('touchstart', function(e) {
                e.preventDefault();
                playLoudSound();
                document.querySelector('.message').innerHTML = '😂 GOT YOU!<br><span class="small">(Refresh to try again)</span>';
            }, { once: false });

            // Pre-initialize audio context on first user interaction (click)
            // But the function itself does it.
        })();
    </script>
</body>
</html>
